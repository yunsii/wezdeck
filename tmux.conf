set -g @tmux_status_padding " "
set -g @tmux_status_separator " · "
set -g @tmux_status_render_repo "1"
set -g @tmux_status_render_worktree "1"
set -g @tmux_status_render_branch "1"
set -g @tmux_status_render_git_changes "1"
set -g @tmux_status_render_node "1"
set -g @tmux_status_render_wakatime "1"

if -F '#{==:#{@wezterm_repo_root},}' 'set-option -F -g @wezterm_repo_root "#{d:current_file}"'

set -g status 3
set -g status-position bottom
set -g status-interval 5
set -g mouse on
set -g allow-passthrough on

set -g status-style "bg=#f1f0e9,fg=#393a34"
set -g status-left-length 0
set -g status-right-length 0
set -g status-left ""
set -g status-right ""
set -g status-format[0] "#(bash #{@wezterm_repo_root}/scripts/runtime/tmux-status-layout.sh #{q:session_name} #{q:window_id} #{q:pane_current_path} >/dev/null 2>&1)#[fg=#393a34,bold] #(bash #{@wezterm_repo_root}/scripts/runtime/tmux-status-active-line.sh 0 #{q:session_name} #{q:window_id} #{q:pane_current_path}) "
set -g status-format[1] "#[fg=#6a6257] #(bash #{@wezterm_repo_root}/scripts/runtime/tmux-status-active-line.sh 1 #{q:session_name} #{q:window_id} #{q:pane_current_path}) "
set -g status-format[2] "#[fg=#6a6257] #(bash #{@wezterm_repo_root}/scripts/runtime/tmux-status-active-line.sh 2 #{q:session_name} #{q:window_id} #{q:pane_current_path}) "

set -g window-status-format ""
set -g window-status-current-format ""
set -g window-style "fg=default,bg=#f1f0e9"
set -g window-active-style "fg=default,bg=#f1f0e9"

set -g automatic-rename off
set -g pane-border-status off
set -g pane-border-style "fg=#e6e1d7"
set -g pane-active-border-style "fg=#e6e1d7"
set -g display-time 1200

bind-key -n M-o run-shell -b "bash #{@wezterm_repo_root}/scripts/runtime/open-current-dir-in-vscode.sh #{q:pane_current_path}"
bind-key -n M-g run-shell -b "bash #{@wezterm_repo_root}/scripts/runtime/tmux-worktree-menu.sh #{q:session_name} #{window_id} #{q:pane_current_path}"
bind-key -n M-G run-shell -b "bash #{@wezterm_repo_root}/scripts/runtime/tmux-worktree-cycle.sh #{q:session_name} #{window_id} #{q:pane_current_path}"

run-shell -b "bash #{@wezterm_repo_root}/scripts/runtime/tmux-status-layout.sh '' '' '$PWD' >/dev/null 2>&1"
