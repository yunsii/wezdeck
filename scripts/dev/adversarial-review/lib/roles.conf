# roles.conf — the reusable standard: each role's reasoning effort + the agent
# candidate sequence (first = default/preferred; the rest are rotation / fallback).
#
# Layered isolation: L1 agent isolation (each role = an independent stateless
# call) is always enforced by the runner; L2 model isolation (cross-model) is a
# preference realized through these candidate sequences — degrade to fewer
# distinct models only when backends are unavailable.
#
# Fields:  tool|role|effort|candidates
#   tool        adversarial | brainstorm
#   role        stage/role name
#   effort      low | medium | high   (per task nature, not "higher = better")
#   candidates  space-separated agent names; candidates[0] is the default,
#               the rest are the rotation/fallback order
#
# Extending: to add a backend, drop lib/providers/<name>.sh (implementing the
# plugin interface) and append <name> to the candidate lists here. No core edits.
# To change a model, edit that plugin's __model (or set its ADV_MODEL_* env).

adversarial|find|high|claude codex grok
adversarial|refute|high|grok codex claude
adversarial|repro|low|grok claude codex
brainstorm|diverge|low|grok codex claude
brainstorm|challenge|medium|grok codex claude
brainstorm|converge|high|claude grok codex
