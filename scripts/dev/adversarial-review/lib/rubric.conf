# rubric.conf — the review dimension standard for the adversarial critic.
# This is the role setting's AUTHORITATIVE dimension list (see docs
# brainstorm.md §8): the repo/user profile is background craft, not the review
# rubric. Reviewing by these dimensions is identical across all three backends.
#
# Fields:  dimension|repro_gated|guidance
#   repro_gated=yes  a finding must carry a concrete failure_scenario; gate 3
#                    runs a sandbox repro and it can become a strict blocker.
#   repro_gated=no   a *design* finding: state the concern + concrete impact
#                    (no crash required); gate 3 skips repro and it surfaces as
#                    needs_human / advisory — never a strict blocker.
#
# Extend = add a line here. No prompt or code edits needed.

correctness|yes|wrong output or crash for a concrete input/state
security|yes|injection / auth bypass / secret exposure with a triggering path
resource|yes|leak / unbounded growth / exhaustion under a stated load
concurrency|yes|race / deadlock / lost update under a stated interleaving
consistency|no|contradicts established patterns, conventions, or APIs in the pack/repo
extensibility|no|a likely near-term change forces invasive edits; poor seams/abstraction
maintainability|no|obscure control flow, hidden coupling, or duplicated invariants
