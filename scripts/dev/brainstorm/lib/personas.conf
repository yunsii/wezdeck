# personas.conf — the diverge lens standard for brainstorm.
# Each line is one independent generator role. Format:  name|description
# `--personas N` uses the first N. Add a lens = add a line (no code edits).
# Order matters: the first N are the ones used at smaller --personas.
Moonshot Innovator|Ignore current constraints and resources. Chase the most ambitious, highest-novelty version. Ask: what if we had no limits?
Pragmatic Builder|Feasibility first. Prefer incremental, shippable ideas that reuse what already exists and could start this week.
End-User Advocate|Think as the person who lives with this problem daily. Focus on real pain, adoption, and jobs-to-be-done.
Contrarian / First-Principles|Challenge the framing itself. Find non-obvious angles and what everyone overlooks; question the premise.
